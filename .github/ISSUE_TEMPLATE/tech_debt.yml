name: Tech Debt
description: Track architecture, reliability, or maintainability improvements.
title: "[Tech Debt] <short summary>"
labels:
  - type:tech-debt
body:
  - type: textarea
    id: problem
    attributes:
      label: Current Problem
      description: What hurts maintainability/reliability today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: What should be changed?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Value / Outcome
      description: Why this is worth doing.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
